<style>
  :root{
    --bg1:#1e1b4b; --bg2:#3730a3; --bg3:#0f172a;
    --accent:#f59e0b; --accent2:#fb923c; --good:#22c55e;
    --danger:#ef4444; --card:#ffffff; --text:#1e293b; --muted:#64748b;
  }
  *{box-sizing:border-box;}
  html, body{ height:100%; }
  body{
    margin:0; min-height:100vh; font-family:'Poppins',Roboto,Arial,sans-serif;
    background:
      radial-gradient(circle at 15% 15%, rgba(245,158,11,.22), transparent 40%),
      radial-gradient(circle at 85% 25%, rgba(99,102,241,.32), transparent 45%),
      radial-gradient(circle at 50% 90%, rgba(34,197,94,.16), transparent 40%),
      linear-gradient(135deg,var(--bg1),var(--bg2) 55%,var(--bg3));
    background-attachment:fixed;
    display:flex; align-items:center; justify-content:center; padding:20px;
    color:var(--text);
    position:relative; overflow-x:hidden;
  }
  body::before, body::after{
    content:""; position:fixed; width:520px; height:520px; border-radius:50%;
    filter:blur(100px); z-index:0; pointer-events:none; opacity:.5;
    animation:floatBlob 20s ease-in-out infinite;
  }
  body::before{ background:#f59e0b; top:-180px; left:-160px; }
  body::after{ background:#6366f1; bottom:-180px; right:-160px; animation-delay:-10s; }
  @keyframes floatBlob{
    0%,100%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(70px,50px) scale(1.2); }
  }
  .app{width:100%; max-width:600px; position:relative; z-index:1;}
  .topbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:10px 18px; margin-bottom:12px; border-radius:16px;
    background:rgba(255,255,255,.12); backdrop-filter:blur(8px);
    color:#fff; font-size:.85rem; font-weight:600;
  }
  .topbar .me{display:flex; align-items:center; gap:8px;}
  .topbar .avatar{
    width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center; font-size:1rem;
  }
  .topbar button{
    background:rgba(255,255,255,.15); border:none; color:#fff; border-radius:10px;
    padding:7px 10px; cursor:pointer; font-size:1rem;
  }
  .topbar button:hover{background:rgba(255,255,255,.28);}
  .card{
    background:var(--card); border-radius:24px; padding:30px 26px;
    box-shadow:0 25px 70px rgba(0,0,0,.4); animation:fadeIn .35s ease;
  }
  @keyframes fadeIn{from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);}}
  h1{
    font-size:1.5rem; margin:0 0 4px; text-align:center; font-weight:800;
    background:linear-gradient(135deg,#1e1b4b,#4338ca 60%,#6d28d9);
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .subtitle{text-align:center; color:var(--muted); margin:0 0 22px; font-size:.92rem;}
  label{display:block; font-weight:600; margin:16px 0 8px; font-size:.9rem; color:#334155;}
  select, input[type=text], input[type=password]{
    width:100%; padding:12px 13px; border-radius:12px; border:1.5px solid #e2e8f0;
    font-size:1rem; background:#f8fafc; font-family:inherit;
  }
  .theme-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px;}
  .theme-btn{
    border:2px solid #e2e8f0; background:#f8fafc; border-radius:16px; padding:16px 10px;
    text-align:center; cursor:pointer; font-size:.95rem; font-weight:600; transition:.15s;
  }
  .theme-btn:hover{border-color:var(--accent); transform:translateY(-2px);}
  .theme-btn.selected{border-color:var(--accent); background:linear-gradient(135deg,#fff7ed,#ffedd5); color:#b45309;}
  .theme-btn{border-top-width:4px; border-top-style:solid;}
  .option.selected-multi{border-color:var(--accent); background:#fff7ed;}
  .name-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px;}
  .name-btn{
    border:2px solid #e2e8f0; background:#f8fafc; border-radius:16px; padding:18px 10px;
    text-align:center; cursor:pointer; font-weight:700; transition:.15s; font-size:1.02rem;
  }
  .name-btn .emoji{font-size:1.8rem; display:block; margin-bottom:4px;}
  .name-btn:hover{border-color:var(--accent); transform:translateY(-2px);}
  .name-btn.selected{border-color:var(--accent); background:linear-gradient(135deg,#fff7ed,#ffedd5);}
  .players{display:flex; flex-direction:column; gap:8px;}
  .player-row{
    display:flex; align-items:center; gap:10px; background:#f8fafc; border:1.5px solid #e2e8f0;
    border-radius:12px; padding:10px 12px;
  }
  .player-row input[type=checkbox]{width:18px; height:18px;}
  .player-row span{font-weight:600;}
  .btn{
    display:block; width:100%; padding:15px; border:none; border-radius:14px;
    font-size:1.05rem; font-weight:700; cursor:pointer; margin-top:18px; transition:.15s;
  }
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#1e1b4b; box-shadow:0 8px 20px rgba(245,158,11,.35);}
  .btn-primary:hover{filter:brightness(1.05); transform:translateY(-1px);}
  .btn-primary:disabled{opacity:.45; cursor:not-allowed; box-shadow:none; transform:none;}
  .btn-secondary{background:#eef2ff; color:#3730a3;}
  .btn-danger{background:#fee2e2; color:#b91c1c;}
  .btn-link{display:block; width:100%; text-align:center; background:none; border:none; color:#6366f1; text-decoration:underline; padding:10px; font-weight:600; cursor:pointer; font-size:.92rem;}
  .footer-actions{display:flex; gap:10px; margin-top:20px;}
  .footer-actions .btn{margin-top:0;}

  .intro-avatar{font-size:3.4rem; text-align:center; margin-bottom:6px;}
  .intro-name{text-align:center; font-size:1.6rem; font-weight:800; color:#1e1b4b; margin-bottom:6px;}
  .intro-hint{text-align:center; color:var(--muted); margin-bottom:6px; font-size:.92rem;}

  .quiz-top{display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;}
  .quiz-progress{font-size:.85rem; color:var(--muted); font-weight:600;}
  .timer-badge{
    font-weight:800; font-size:1.05rem; padding:5px 13px; border-radius:20px;
    background:#eef2ff; color:#4338ca; min-width:52px; text-align:center;
  }
  .timer-badge.warn{background:#fee2e2; color:#b91c1c;}
  .progress-bar-bg{width:100%; height:8px; background:#e2e8f0; border-radius:8px; overflow:hidden; margin-bottom:20px;}
  .progress-bar-fill{height:100%; background:linear-gradient(90deg,#22c55e,#f59e0b); transition:width .3s linear;}
  .question-text{font-size:1.15rem; font-weight:700; margin-bottom:18px; color:#1e1b4b; line-height:1.4;}
  .options{display:flex; flex-direction:column; gap:10px;}
  .option{
    text-align:left; padding:14px 16px; border-radius:14px; border:2px solid #e2e8f0;
    background:#f8fafc; cursor:pointer; font-size:.98rem; font-weight:600; color:#334155;
    transition:.12s;
  }
  .option:hover{border-color:#a5b4fc; transform:translateX(2px);}
  .option.correct{background:#dcfce7; border-color:#22c55e; color:#166534;}
  .option.wrong{background:#fee2e2; border-color:#ef4444; color:#991b1b;}
  .option.disabled{pointer-events:none;}

  .rank-row{
    display:flex; align-items:center; gap:12px; padding:12px 14px; border-radius:14px;
    background:#f8fafc; margin-bottom:8px; position:relative; overflow:hidden;
  }
  .rank-row.me{border:2px solid var(--accent);}
  .rank-row.top1{background:linear-gradient(90deg,#fef9c3,#fde68a);}
  .rank-medal{font-size:1.4rem; width:32px; text-align:center; z-index:1;}
  .rank-name{flex:1; font-weight:700; z-index:1;}
  .rank-score{font-weight:800; color:#1e1b4b; z-index:1;}
  .rank-bar{position:absolute; left:0; top:0; bottom:0; background:rgba(245,158,11,.15); z-index:0; transition:width .5s ease;}
  .badge-multi{display:block; text-align:center; margin-bottom:10px;}
  .section-title{font-size:.85rem; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:22px 0 10px; font-weight:700;}
  .small-note{font-size:.78rem; color:var(--muted); text-align:center; margin-top:14px;}
  .hidden{display:none !important;}
  .pin-input{text-align:center; font-size:1.6rem; letter-spacing:.4em; margin-top:14px;}
  .pin-error{color:#b91c1c; text-align:center; margin-top:10px; font-size:.85rem; min-height:1em;}
  .badge{display:inline-block; padding:3px 10px; border-radius:20px; font-size:.72rem; font-weight:700; background:#eef2ff; color:#3730a3; margin-left:6px;}
  .spinner{width:34px; height:34px; border:4px solid #e2e8f0; border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite; margin:20px auto;}
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>

/* ============== UTILS ============== */
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function todayStr(){
  const d = new Date();
  return d.toLocaleDateString('fr-FR', {day:'2-digit', month:'2-digit', year:'numeric'});
}

/* ============== DEMARRAGE / FIREBASE ============== */
function isConfigMissing(){
  return !firebaseConfig.apiKey || firebaseConfig.apiKey.indexOf("COLLE_ICI") !== -1;
}

function boot(){
  if(isConfigMissing()){
    renderSetupNeeded();
    return;
  }
  try{
    firebase.initializeApp(firebaseConfig);
    auth = firebase.auth();
    db = firebase.firestore();
  }catch(e){
    renderFatalError(e);
    return;
  }
  renderConnecting();
  auth.onAuthStateChanged(user=>{
    if(user){
      startApp();
    }
  });
  auth.signInAnonymously().catch(err=>{
    renderFatalError(err);
  });
}

function renderSetupNeeded(){
  topbarEl.classList.add("hidden");
  el.innerHTML = `
    <div class="intro-avatar">🛠️</div>

    <p class="subtitle">Ce fichier n'est pas encore relié à ta base de données en ligne.</p>
    <p class="small-note" style="text-align:left;line-height:1.6;">
      Ouvre <strong>index.html</strong> avec un éditeur de texte, repère le bloc <code>firebaseConfig</code>
      tout en haut du script, et remplace les valeurs par celles de ton projet Firebase.
      Le guide complet se trouve dans <strong>SETUP_INSTRUCTIONS.md</strong>.
    </p>
  `;
}

function renderConnecting(){
  topbarEl.classList.add("hidden");
  el.innerHTML = `<div class="spinner"></div><p class="subtitle">Connexion en cours...</p>`;
}

function renderFatalError(e){
  topbarEl.classList.add("hidden");
  el.innerHTML = `
    <div class="intro-avatar">⚠️</div>
    <h1>Oups, connexion impossible</h1>
    <p class="subtitle">${(e && e.message) ? e.message : "Erreur inconnue"}</p>
    <p class="small-note">Vérifie ta configuration Firebase (clé API, projet) et ta connexion internet.</p>
  `;
}

function renderNamePicker(){
  topbarEl.classList.add("hidden");
  el.innerHTML = `
    <div class="intro-avatar">👋</div>
    <h1>Bienvenue !</h1>
    <p class="subtitle">Qui es-tu ?</p>
    <div class="name-grid" id="name-grid">
      ${DEFAULT_PLAYERS.map(p=>`<div class="name-btn" data-name="${p}"><span class="emoji">${avatarFor(p)}</span>${p}</div>`).join('')}
    </div>
    <label>Ou un autre prénom</label>
    <input type="text" id="custom-name" placeholder="Ton prénom">
    <button class="btn btn-primary" id="confirm-name-btn">Continuer ▶️</button>
  `;
  let selected = null;
  document.querySelectorAll(".name-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      document.querySelectorAll(".name-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      selected = btn.dataset.name;
      document.getElementById("custom-name").value = "";
    });
  });
  document.getElementById("custom-name").addEventListener("input", e=>{
    if(e.target.value.trim()){
      document.querySelectorAll(".name-btn").forEach(b=>b.classList.remove("selected"));
      selected = null;
    }
  });
  document.getElementById("confirm-name-btn").addEventListener("click", ()=>{
    const custom = document.getElementById("custom-name").value.trim();
    const name = custom || selected;
    if(!name){ alert("Choisis ou écris un prénom."); return; }
    myName = name;
    localStorage.setItem("qf_playerName", name);
    attachTopbar();
    attachStateListener();
  });
}

/* ============== ECOUTE DE L'ETAT GLOBAL (TEMPS REEL) ============== */
function attachStateListener(){
  db.collection("meta").doc("state").onSnapshot(doc=>{
    const data = doc.exists ? doc.data() : {activeGame:null};
    handleActiveGame(data.activeGame || null);
  }, err=>{
    renderFatalError(err);
  });
}

function handleActiveGame(activeGame){
  currentActiveGame = activeGame;
  if(liveResultsUnsub){ liveResultsUnsub(); liveResultsUnsub = null; }
  if(!activeGame){
    renderWaiting();
    return;
  }
  const resultId = activeGame.id + "_" + myName;
  db.collection("liveResults").doc(resultId).get().then(snap=>{
    if(snap.exists){
      renderGameResults(activeGame, snap.data());
    } else {
      renderGameIntro(activeGame);
    }
  });
}

      renderPersoQuestion();
    });
  }
}

/* ============== QUIZ CULTURE : QUESTION + CHRONO ============== */
function renderQuizQuestion(){
  clearInterval(quizState.timerId);
  const { activeGame } = quizState;
  const total = activeGame.questions.length;
  const item = activeGame.questions[quizState.qIndex];
  const isMulti = item.type === "multi";
  quizState.timeLeft = activeGame.chrono;
  let selected = new Set();

  el.innerHTML = `
    <div class="quiz-top">
      <span class="quiz-progress">Question ${quizState.qIndex+1} / ${total}</span>
      <span class="timer-badge" id="timer-badge">${quizState.timeLeft}s</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" id="progress-fill" style="width:100%"></div></div>
    ${isMulti ? `<span class="badge badge-multi">✅ Plusieurs bonnes réponses possibles</span>` : ''}
    <div class="question-text">${item.q}</div>
    <div class="options" id="options-wrap">
      ${item.options.map(opt=>`<button class="option${isMulti?' option-multi':''}" data-val="${encodeURIComponent(opt)}">${opt}</button>`).join('')}
    </div>
    ${isMulti ? `<button class="btn btn-primary" id="submit-multi-btn" disabled>Valider ma réponse</button>` : ''}
  `;

  const badge = document.getElementById("timer-badge");
  const fill = document.getElementById("progress-fill");

  if(isMulti){
    document.querySelectorAll(".option-multi").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        const val = decodeURIComponent(btn.dataset.val);
        if(selected.has(val)){ selected.delete(val); btn.classList.remove("selected-multi"); }
        else { selected.add(val); btn.classList.add("selected-multi"); }
        document.getElementById("submit-multi-btn").disabled = selected.size === 0;
      });
    });
    document.getElementById("submit-multi-btn").addEventListener("click", ()=>{
      lockQuizAnswer(Array.from(selected));
    });
  } else {
    document.querySelectorAll(".option").forEach(btn=>{
      btn.addEventListener("click", ()=>{
        lockQuizAnswer(decodeURIComponent(btn.dataset.val));
      });
    });
  }

  quizState.timerId = setInterval(()=>{
    quizState.timeLeft--;
    badge.textContent = quizState.timeLeft + "s";
    fill.style.width = (quizState.timeLeft/activeGame.chrono*100) + "%";
    if(quizState.timeLeft <= 5) badge.classList.add("warn");
    if(quizState.timeLeft <= 0){
      lockQuizAnswer(isMulti ? Array.from(selected) : null);
    }
  }, 1000);
}

function lockQuizAnswer(chosenVal){
  clearInterval(quizState.timerId);
  const { activeGame } = quizState;
  const item = activeGame.questions[quizState.qIndex];
  const isMulti = item.type === "multi";
  let isCorrect;

  if(isMulti){
    const chosenArr = chosenVal || [];
    const chosenSet = new Set(chosenArr);
    const correctSet = new Set(item.correct);
    isCorrect = chosenSet.size === correctSet.size && chosenArr.every(v=>correctSet.has(v));
    document.querySelectorAll(".option-multi").forEach(btn=>{
      const val = decodeURIComponent(btn.dataset.val);
      btn.classList.add("disabled");
      if(item.correct.includes(val)) btn.classList.add("correct");
      else if(chosenArr.includes(val)) btn.classList.add("wrong");
    });
    const subBtn = document.getElementById("submit-multi-btn");
    if(subBtn) subBtn.disabled = true;
  } else {
    isCorrect = chosenVal === item.correct;
    document.querySelectorAll(".option").forEach(btn=>{
      const val = decodeURIComponent(btn.dataset.val);
      btn.classList.add("disabled");
      if(val === item.correct) btn.classList.add("correct");
      else if(val === chosenVal) btn.classList.add("wrong");
    });
  }

  quizState.answers.push({isCorrect});

  setTimeout(()=>{
    if(quizState.qIndex + 1 < activeGame.questions.length){
      quizState.qIndex++;
      renderQuizQuestion();
    } else {
      finishQuiz();
    }
  }, isMulti ? 1400 : 900);
}

function finishQuiz(){
  const { activeGame, answers } = quizState;
  const score = answers.filter(a=>a.isCorrect).length;
  el.innerHTML = `<div class="spinner"></div><p class="subtitle">Envoi de ton score...</p>`;
  const resultId = activeGame.id + "_" + myName;
  db.collection("liveResults").doc(resultId).set({
    gameId: activeGame.id, mode:"quiz", key:activeGame.key, player: myName, score: score,
    finishedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(()=>{
    renderGameResults(activeGame, {score});
  });
}

/* ============== JEUX PERSO : QUESTION (SANS CHRONO) ============== */
function renderPersoQuestion(){
  const { activeGame } = persoState;
  const pq = PERSONALITY_QUIZZES[activeGame.key];
  const total = pq.questions.length;
  const item = pq.questions[persoState.qIndex];
  const shuffledOptions = shuffle(item.options);

  el.innerHTML = `
    <div class="quiz-top">
      <span class="quiz-progress">Question ${persoState.qIndex+1} / ${total}</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${(persoState.qIndex/total*100)}%"></div></div>
    <div class="question-text">${item.q}</div>
    <div class="options">
      ${shuffledOptions.map(o=>`<button class="option" data-k="${o.k}">${o.t}</button>`).join('')}
    </div>
  `;

  document.querySelectorAll(".option").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      const k = btn.dataset.k;
      persoState.tally[k] = (persoState.tally[k] || 0) + 1;
      if(persoState.qIndex + 1 < total){
        persoState.qIndex++;
        renderPersoQuestion();
      } else {
        finishPerso();
      }
    });
  });
}

function finishPerso(){
  const { activeGame, tally } = persoState;
  let bestKey = null, bestCount = -1;
  Object.entries(tally).forEach(([k,c])=>{ if(c > bestCount){ bestCount = c; bestKey = k; } });
  el.innerHTML = `<div class="spinner"></div><p class="subtitle">Calcul de ton profil...</p>`;
  const resultId = activeGame.id + "_" + myName;
  db.collection("liveResults").doc(resultId).set({
    gameId: activeGame.id, mode:"perso", key:activeGame.key, player: myName, outcomeKey: bestKey,
    finishedAt: firebase.firestore.FieldValue.serverTimestamp()
  }).then(()=>{
    renderGameResults(activeGame, {outcomeKey: bestKey});
  });
}

/* ============== ECRAN : RESULTATS (LIVE) ============== */
function renderGameResults(activeGame, myResult){
  if(activeGame.mode === "quiz"){
    renderQuizResults(activeGame, myResult);
  } else {
    renderPersoResult(activeGame, myResult);
  }
}

function renderQuizResults(activeGame, myResult){
  const theme = THEMES[activeGame.key];
  el.innerHTML = `
    <h1>🏆 ${theme.label}</h1>
    <p class="subtitle">Ton score : <strong>${myResult.score} / 10</strong></p>
    <div class="section-title">Classement du jeu (en direct)</div>
    <div id="live-rank"><div class="spinner"></div></div>
    <div class="section-title">Classement général de la saison</div>
    <div id="season-rank"><div class="spinner"></div></div>
  `;

  if(liveResultsUnsub){ liveResultsUnsub(); }
  liveResultsUnsub = db.collection("liveResults").where("gameId","==",activeGame.id)
    .onSnapshot(snap=>{
      const rows = [];
      snap.forEach(doc=> rows.push(doc.data()));
      rows.sort((a,b)=> b.score - a.score);
      const medals = ["🥇","🥈","🥉"];
      const maxScore = 10;
      document.getElementById("live-rank").innerHTML = rows.map((r,i)=>`
        <div class="rank-row ${i===0?'top1':''} ${r.player===myName?'me':''}">
          <div class="rank-bar" style="width:${(r.score/maxScore*100)}%"></div>
          <div class="rank-medal">${medals[i] || (i+1)+"."}</div>
          <div class="rank-name">${avatarFor(r.player)} ${r.player}</div>
          <div class="rank-score">${r.score}/10</div>
        </div>
      `).join('') || `<p class="small-note">En attente des autres joueurs...</p>`;
    });

  db.collection("meta").doc("season").onSnapshot(doc=>{
    const season = doc.exists ? doc.data() : {totals:{}};
    const ranking = Object.entries(season.totals || {}).sort((a,b)=>b[1].points-a[1].points);
    const medals = ["🥇","🥈","🥉"];
    document.getElementById("season-rank").innerHTML = ranking.length ? ranking.map(([name,d],i)=>`
      <div class="rank-row ${name===myName?'me':''}">
        <div class="rank-medal">${medals[i] || (i+1)+"."}</div>
        <div class="rank-name">${avatarFor(name)} ${name} <span style="color:#94a3b8;font-weight:500;">(${d.games} quiz)</span></div>
        <div class="rank-score">${d.points} pts</div>
      </div>
    `).join('') : `<p class="small-note">Premier quiz de la saison !</p>`;
  });
}

function renderPersoResult(activeGame, myResult){
  const pq = PERSONALITY_QUIZZES[activeGame.key];
  const outcome = pq.outcomes[myResult.outcomeKey];
  el.innerHTML = `
    <div class="intro-avatar" style="font-size:4rem;">${outcome.emoji}</div>
    <div class="intro-hint" style="font-size:1.1rem;">${myName}, tu es...</div>
    <div class="intro-name" style="color:#b45309;">${outcome.title}</div>
    <p class="subtitle" style="margin-top:10px;">${outcome.desc}</p>
    <p class="small-note">Ce jeu n'a pas de classement, juste pour le fun 🎉 Le résultat est gardé dans l'historique.</p>
  `;
}

/* ============== ECRAN : HISTORIQUE (ACCESSIBLE A TOUS) ============== */
function renderHistoryScreen(){
  el.innerHTML = `<div class="spinner"></div><p class="subtitle">Chargement de l'historique...</p>`;
  Promise.all([
    db.collection("meta").doc("season").get(),
    db.collection("history").orderBy("createdAt","desc").limit(15).get().catch(()=> db.collection("history").limit(15).get())
  ]).then(([seasonSnap, histSnap])=>{
    const season = seasonSnap.exists ? seasonSnap.data() : {totals:{}};
    const ranking = Object.entries(season.totals || {}).sort((a,b)=>b[1].points-a[1].points);
    const medals = ["🥇","🥈","🥉"];
    const historyItems = [];
    histSnap.forEach(doc=> historyItems.push(doc.data()));

    el.innerHTML = `
      <h1>📊 Classement & historique</h1>
      <div class="section-title">Classement général de la saison (Quiz Culture)</div>
      ${ranking.length ? ranking.map(([name,d],i)=>`
        <div class="rank-row ${i===0?'top1':''}">
          <div class="rank-medal">${medals[i] || (i+1)+"."}</div>
          <div class="rank-name">${avatarFor(name)} ${name} <span style="color:#94a3b8;font-weight:500;">(${d.games} quiz)</span></div>
          <div class="rank-score">${d.points} pts</div>
        </div>
      `).join('') : `<p class="small-note">Pas encore de quiz joué.</p>`}

      <div class="section-title">Historique des jeux</div>
      ${historyItems.length ? historyItems.map(h=>{
        const isQuiz = h.mode === "quiz";
        const label = isQuiz ? (THEMES[h.key] ? THEMES[h.key].label : h.key) : (PERSONALITY_QUIZZES[h.key] ? PERSONALITY_QUIZZES[h.key].label : h.key);
        const resultsTxt = Object.entries(h.results || {}).map(([n,v])=>{
          if(isQuiz) return `${n}: ${v}/10`;
          const pq = PERSONALITY_QUIZZES[h.key];
          const o = pq && pq.outcomes[v];
          return `${n}: ${o ? o.title : v}`;
        }).join(' · ');
        return `
          <div class="rank-row" style="flex-direction:column; align-items:flex-start;">
            <strong>${h.date || ''} · ${label}</strong>
            <span style="color:#64748b;font-size:.85rem;">${resultsTxt}</span>
          </div>
        `;
      }).join('') : `<p class="small-note">Pas encore d'historique.</p>`}

      <button class="btn btn-primary" id="back-btn">Retour</button>
    `;
    document.getElementById("back-btn").addEventListener("click", ()=>{
      handleActiveGame(currentActiveGame);
    });
  });
}

/* ============================================================
   MODE ADMIN (reserve a Jopa)
   ============================================================ */
function renderAdminPinGate(){
  el.innerHTML = `
    <div class="intro-avatar">🔒</div>
    <div class="intro-name">Mode Admin</div>
    <div class="intro-hint">Entre le code pour choisir le jeu de la semaine</div>
    <input type="password" id="pin-input" class="pin-input" inputmode="numeric" maxlength="8" placeholder="••••">
    <div class="pin-error" id="pin-error"></div>
    <button class="btn btn-primary" id="unlock-btn">Déverrouiller</button>
    <button class="btn-link" id="cancel-btn" type="button">Annuler</button>
  `;
  const input = document.getElementById("pin-input");
  const tryUnlock = ()=>{
    if(input.value === PIN_CODE){ renderAdminDashboard(); }
    else {
      document.getElementById("pin-error").textContent = "Code incorrect.";
      input.value = ""; input.focus();
    }
  };
  document.getElementById("unlock-btn").addEventListener("click", tryUnlock);
  input.addEventListener("keydown", e=>{ if(e.key === "Enter") tryUnlock(); });
  document.getElementById("cancel-btn").addEventListener("click", ()=> handleActiveGame(currentActiveGame));
  input.focus();
}

function renderAdminDashboard(){
  el.innerHTML = `<div class="spinner"></div>`;
  db.collection("meta").doc("state").get().then(doc=>{
    const activeGame = doc.exists ? (doc.data().activeGame || null) : null;
    renderAdminDashboardWith(activeGame);
  });
}

function renderAdminDashboardWith(activeGame){
  let statusHTML = "";
  if(activeGame){
    const label = activeGame.mode === "quiz" ? THEMES[activeGame.key].label : PERSONALITY_QUIZZES[activeGame.key].label;
    statusHTML = `
      <div class="rank-row" style="flex-direction:column; align-items:flex-start;">
        <strong>Jeu en cours : ${label}</strong>
        <span style="color:#64748b;font-size:.85rem;" id="admin-live-count">Chargement des réponses...</span>
      </div>
      <button class="btn btn-danger" id="end-game-btn" type="button">Terminer ce jeu</button>
    `;
  } else {
    statusHTML = `<p class="small-note">Aucun jeu actif en ce moment.</p>`;
  }

  el.innerHTML = `
    <h1>⚙️ Tableau de bord admin</h1>
    <p class="subtitle">Choisis le jeu de la semaine</p>

    ${statusHTML}

    <div class="section-title">Quiz Culture (chrono)</div>
    <div class="theme-grid" id="admin-quiz-grid">
      ${Object.entries(THEMES).map(([key,t])=>`<div class="theme-btn" data-mode="quiz" data-key="${key}" style="border-top-color:${colorFor(key)};">${t.emoji}<br>${t.label.replace(/^\S+\s/,'')}</div>`).join('')}
    </div>
    <label>Temps par question</label>
    <select id="chrono-select">
      <option value="15">15 secondes</option>
      <option value="20" selected>20 secondes</option>
      <option value="25">25 secondes</option>
      <option value="30">30 secondes</option>
    </select>

    <div class="section-title">Jeux de personnalité (sans chrono)</div>
    <div class="theme-grid" id="admin-perso-grid">
      ${Object.entries(PERSONALITY_QUIZZES).map(([key,pq])=>`<div class="theme-btn" data-mode="perso" data-key="${key}" style="border-top-color:${colorFor(key)};">${pq.emoji}<br>${pq.label.replace(/^\S+\s/,'')}</div>`).join('')}
    </div>

    <button class="btn btn-primary" id="launch-btn" disabled>Choisis un jeu pour lancer</button>
    <button class="btn-link" id="back-btn" type="button">← Retour</button>
  `;

  let selectedMode = null, selectedKey = null;
  document.querySelectorAll("#admin-quiz-grid .theme-btn, #admin-perso-grid .theme-btn").forEach(btn=>{
    btn.addEventListener("click", ()=>{
      document.querySelectorAll("#admin-quiz-grid .theme-btn, #admin-perso-grid .theme-btn").forEach(b=>b.classList.remove("selected"));
      btn.classList.add("selected");
      selectedMode = btn.dataset.mode;
      selectedKey = btn.dataset.key;
      const launchBtn = document.getElementById("launch-btn");
      launchBtn.disabled = false;
      launchBtn.textContent = "🚀 Lancer ce jeu pour tout le monde";
    });
  });

  document.getElementById("launch-btn").addEventListener("click", ()=>{
    if(!selectedMode) return;
    launchGame(selectedMode, selectedKey, document.getElementById("chrono-select").value);
  });

  document.getElementById("back-btn").addEventListener("click", ()=> handleActiveGame(currentActiveGame));

  const endBtn = document.getElementById("end-game-btn");
  if(endBtn) endBtn.addEventListener("click", endGame);

  if(activeGame){
    db.collection("liveResults").where("gameId","==",activeGame.id).onSnapshot(snap=>{
      const el2 = document.getElementById("admin-live-count");
      if(el2) el2.textContent = snap.size + " joueur(s) ont déjà répondu";
    });
  }
}

function launchGame(mode, key, chronoValue){
  const finish = (activeGame)=>{
    db.collection("meta").doc("state").set({activeGame}).then(()=>{
      renderAdminDashboardWith(activeGame);
    });
  };
  if(mode === "quiz"){
    pickRotatingQuestions(key, 10).then(picked=>{
      const bank = picked.map(item=>({
        q:item.q, type:item.type || "single",
        options: shuffle(item.options), correct:item.correct
      }));
      finish({ id:"g_"+Date.now(), mode:"quiz", key, chrono: parseInt(chronoValue,10), questions: bank, startedAt: Date.now() });
    });
  } else {
    finish({ id:"g_"+Date.now(), mode:"perso", key, startedAt: Date.now() });
  }
}

/* Choisit 10 questions en évitant de répéter celles déjà utilisées récemment
   pour cette thématique, jusqu'à épuisement complet du stock (puis ça recommence). */
function pickRotatingQuestions(themeKey, count){
  return db.collection("meta").doc("usedQuestions").get().then(snap=>{
    const data = snap.exists ? snap.data() : {};
    let used = data[themeKey] || [];
    const allQuestions = THEMES[themeKey].questions;
    let available = allQuestions.filter(q => used.indexOf(q.q) === -1);
    if(available.length < count){
      used = [];
      available = allQuestions.slice();
    }
    const picked = shuffle(available).slice(0, count);
    const newUsed = used.concat(picked.map(p=>p.q));
    return db.collection("meta").doc("usedQuestions").set({[themeKey]: newUsed}, {merge:true}).then(()=> picked);
  });
}

function endGame(){
  if(!confirm("Terminer ce jeu et afficher le message d'attente à tout le monde ?")) return;
  db.collection("meta").doc("state").get().then(doc=>{
    const activeGame = doc.exists ? (doc.data().activeGame || null) : null;
    if(!activeGame){ renderAdminDashboardWith(null); return; }
    db.collection("liveResults").where("gameId","==",activeGame.id).get().then(snap=>{
      const results = {};
      snap.forEach(d=>{
        const data = d.data();
        results[data.player] = data.mode === "quiz" ? data.score : data.outcomeKey;
      });
      const histDoc = {
        mode: activeGame.mode, key: activeGame.key, date: todayStr(),
        results, createdAt: firebase.firestore.FieldValue.serverTimestamp()
      };
      const tasks = [db.collection("history").add(histDoc)];
      if(activeGame.mode === "quiz"){
        tasks.push(db.collection("meta").doc("season").get().then(seasonSnap=>{
          const season = seasonSnap.exists ? seasonSnap.data() : {totals:{}};
          if(!season.totals) season.totals = {};
          Object.entries(results).forEach(([name,score])=>{
            if(!season.totals[name]) season.totals[name] = {points:0, games:0};
            season.totals[name].points += score;
            season.totals[name].games += 1;
          });
          return db.collection("meta").doc("season").set(season);
        }));
      }
      Promise.all(tasks).then(()=>{
        db.collection("meta").doc("state").set({activeGame:null}).then(()=>{
          renderAdminDashboardWith(null);
        });
      });
    });
  });
}

/* ============== DEMARRAGE ============== */
boot();
</script>
